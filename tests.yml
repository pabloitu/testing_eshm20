- Poisson_T:
    func: poisson_evaluations.paired_t_test
    ref_model: SEIFA13
    plot_func:
      - plot_comparison_test:
          plot_kwargs:
            title: $T$-test
            title_fontsize: 16
            figsize: !!python/tuple [ 8, 6 ]
            ylabel: Information Gain / EQ
          plot_args:
            code: |
              import numpy
              import matplotlib.transforms as mtransforms

              names = [r.sim_name[0] for r in results]

              def grp(n):
                  if n.startswith("FSM20"):
                      return "ESHM20 Fault + Background"
                  if n.startswith("ASM20"):
                      return "ESHM20 Area Source"
                  return "ESHM13"

              groups = []
              for i, n in enumerate(names):
                  g = grp(n)
                  if groups and groups[-1][0] == g:
                      groups[-1][2] = i
                  else:
                      groups.append([g, i, i])

              fig = ax.get_figure()
              fig.canvas.draw()

              figtr = fig.transFigure.inverted()
              ys = []
              for t in ax.get_xticklabels():
                  ys.append(figtr.transform(t.get_window_extent())[0][1])
              ylab = min(ys)
              need = 0.075 - ylab
              if need > 0:
                  pos = ax.get_position()
                  ax.set_position([pos.x0, pos.y0 + need, pos.width, pos.height - need])
                  fig.canvas.draw()

              inv = ax.transAxes.inverted()
              ys = []
              for t in ax.get_xticklabels():
                  ys.append(inv.transform(t.get_window_extent())[0][1])
              y0 = min(ys) - 0.015
              trans = mtransforms.blended_transform_factory(ax.transData, ax.transAxes)
              tick = 0.012

              for label_, i0, i1 in groups:
                  x0, x1 = i0 - 0.35, i1 + 0.35
                  ax.plot([x0, x0, x1, x1], [y0 + tick, y0, y0, y0 + tick],
                          color="black", linewidth=1.0, transform=trans, clip_on=False)
                  ax.text((x0 + x1) / 2, y0 - 0.01, label_, ha="center", va="top",
                          transform=trans, fontsize=10)