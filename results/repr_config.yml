tests:
- Poisson_N:
    func: csep.core.poisson_evaluations.number_test
    plot_func:
    - csep.plots.plot_consistency_test:
        plot_args:
          code: "import numpy\nimport matplotlib.ticker as tick\nfrom matplotlib.lines\
            \ import Line2D\nimport seaborn\nimport matplotlib.pyplot as\
            \ plt\nseaborn.set_style(\"white\", {\"axes.facecolor\": \"\
            .9\", 'font.family': 'Ubuntu'})\nplt.rcParams.update({'xtick.bottom':\
            \ True, 'axes.labelweight': 'bold',\n                     'xtick.labelsize':\
            \ 8, 'ytick.labelsize': 8,\n                     'legend.fontsize':\
            \ 9})\nax.axvline(results[0].observed_statistic, color='black',\
            \ linewidth=1, linestyle='--')\nax.text(results[0].observed_statistic\
            \ + 30, len(results) - 4.8, 'Events in 7 yrs.', rotation=90)\n\
            ax.set_xlim([0, ax.get_xlim()[1]])\nfor i, j in enumerate(results):\n\
            \    ax.plot(j.test_distribution[1], len(results) - i - 1, 'ko',\
            \ markersize=4)\nax.xaxis.set_major_locator(tick.MaxNLocator(integer=True))\n\
            legend_elements = [Line2D([0], [0], marker='o', lw=0, label='Mean\
            \ rate', color='k', markersize=5),\n                   Line2D([0],\
            \ [0], color='k', lw=1, label='95% conf.'),\n              \
            \     Line2D([0], [1], color='k', ls='--', lw=1, label='Obs.\
            \ events')]\nax.legend(handles=legend_elements, loc='lower right')\n"
        plot_kwargs:
          title: $\mathcal{N}$-test
          title_fontsize: 16
          figsize:
          - 5
          - 6
          xlabel: Event counts
          linewidth: 0.5
          capsize: 0
- Poisson_S:
    func_kwargs:
      seed: 23
      num_simulations: 1000
    func: csep.core.poisson_evaluations.spatial_test
    plot_func:
    - csep.plots.plot_consistency_test:
        plot_args:
          code: "import numpy\nimport matplotlib.ticker as tick\nfrom matplotlib.lines\
            \ import Line2D\nimport seaborn\nseaborn.set_style(\"white\"\
            , {\"axes.facecolor\": \".9\", 'font.family': 'Ubuntu'})\n\n\
            for i, j in enumerate(results):\n    ax.plot(numpy.mean(j.test_distribution),\
            \ len(results) - i - 1, 'ko', markersize=4)\n    ax.xaxis.set_major_locator(tick.MaxNLocator(integer=True))\n\
            legend_elements = [Line2D([0], [0], marker='o', lw=0, label='Sim.\
            \ expected value',\n                          color='k', markersize=2),\n\
            \                   Line2D([0], [0], color='k', lw=1, label='Sim.\
            \ 95% conf.'),\n                   Line2D([0], [1], color='green',\
            \ marker='s', lw=0, markersize=4, label='Obs. Likelihood (passes)'),\n\
            \                   Line2D([0], [1], color='red', marker='o',\
            \ lw=0, markersize=4, label='Obs. Likelihood (fails)')]\nax.legend(handles=legend_elements,\
            \ loc='lower left', fontsize=9)\n"
        plot_kwargs:
          one_sided_lower: true
          title: $\mathcal{S}$-test
          title_fontsize: 16
          figsize:
          - 5
          - 6
          xlabel: Spatial log-likelihood
          linewidth: 0.5
          capsize: 0
- Poisson_M:
    func_kwargs:
      seed: 23
      num_simulations: 1000
    func: csep.core.poisson_evaluations.magnitude_test
    plot_func:
    - csep.plots.plot_consistency_test:
        plot_args:
          code: "import numpy\nimport matplotlib.ticker as tick\nfrom matplotlib.lines\
            \ import Line2D\nimport seaborn\nseaborn.set_style(\"white\"\
            , {\"axes.facecolor\": \".9\", 'font.family': 'Ubuntu'})\n\n\
            for i, j in enumerate(results):\n    ax.plot(numpy.mean(j.test_distribution),\
            \ len(results) - i - 1, 'ko', markersize=4)\n    ax.xaxis.set_major_locator(tick.MaxNLocator(integer=True))\n\
            legend_elements = [Line2D([0], [0], marker='o', lw=0, label='Sim.\
            \ expected value',\n                          color='k', markersize=2),\n\
            \                   Line2D([0], [0], color='k', lw=1, label='Sim.\
            \ 95% conf.'),\n                   Line2D([0], [1], color='green',\
            \ marker='s', lw=0, markersize=4, label='Obs. Likelihood (passes)'),\n\
            \                   Line2D([0], [1], color='red', marker='o',\
            \ lw=0, markersize=4, label='Obs. Likelihood (fails)')]\nax.legend(handles=legend_elements,\
            \ loc='lower left', fontsize=9)\n"
        plot_kwargs:
          one_sided_lower: true
          title: $\mathcal{M}$-test
          title_fontsize: 16
          figsize:
          - 5
          - 6
          xlabel: Magnitude log-likelihood
          linewidth: 0.5
          capsize: 0
- Poisson_T:
    ref_model: SEIFA13
    func: csep.core.poisson_evaluations.paired_t_test
    plot_func:
    - csep.plots.plot_comparison_test:
        plot_args:
          code: "import numpy\nimport matplotlib.transforms as mtransforms\n\
            \nnames = [r.sim_name[0] for r in results]\n\ndef grp(n):\n\
            \    if n.startswith(\"FSM20\"):\n        return \"ESHM20 Fault\
            \ + Background\"\n    if n.startswith(\"ASM20\"):\n        return\
            \ \"ESHM20 Area Source\"\n    return \"ESHM13\"\n\ngroups =\
            \ []\nfor i, n in enumerate(names):\n    g = grp(n)\n    if\
            \ groups and groups[-1][0] == g:\n        groups[-1][2] = i\n\
            \    else:\n        groups.append([g, i, i])\n\nfig = ax.get_figure()\n\
            fig.canvas.draw()\n\nfigtr = fig.transFigure.inverted()\nys\
            \ = []\nfor t in ax.get_xticklabels():\n    ys.append(figtr.transform(t.get_window_extent())[0][1])\n\
            ylab = min(ys)\nneed = 0.075 - ylab\nif need > 0:\n    pos =\
            \ ax.get_position()\n    ax.set_position([pos.x0, pos.y0 + need,\
            \ pos.width, pos.height - need])\n    fig.canvas.draw()\n\n\
            inv = ax.transAxes.inverted()\nys = []\nfor t in ax.get_xticklabels():\n\
            \    ys.append(inv.transform(t.get_window_extent())[0][1])\n\
            y0 = min(ys) - 0.015\ntrans = mtransforms.blended_transform_factory(ax.transData,\
            \ ax.transAxes)\ntick = 0.012\n\nfor label_, i0, i1 in groups:\n\
            \    x0, x1 = i0 - 0.35, i1 + 0.35\n    ax.plot([x0, x0, x1,\
            \ x1], [y0 + tick, y0, y0, y0 + tick],\n            color=\"\
            black\", linewidth=1.0, transform=trans, clip_on=False)\n  \
            \  ax.text((x0 + x1) / 2, y0 - 0.01, label_, ha=\"center\",\
            \ va=\"top\",\n            transform=trans, fontsize=10)"
        plot_kwargs:
          title: $T$-test
          title_fontsize: 16
          figsize:
          - 8
          - 6
          ylabel: Information Gain / EQ
